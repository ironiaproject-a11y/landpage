<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - Hero Premium</title>

    <!-- Preloads essenciais (WOFF2 Heading + Poster Crítico) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Preload Critical Poster para LCP mais baixo -->
    <link rel="preload" href="../public/luxury-hero/mp4_1080_variantA.mp4" as="video" type="video/mp4">

    <link rel="stylesheet" href="hero.css">

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

    <!-- Hero Trigger (Calculates Scroll Space) -->
    <div class="hero-trigger">
        <!-- Hero Section (Sticky Container) -->
        <section id="hero" class="hero" aria-label="Hero">

            <div class="video-container">
                <!-- 
                Video Element - controlled by GSAP
                -->
                <video id="heroVideo" class="hero-video" playsinline muted preload="auto"
                    poster="../public/hero-video.webp" crossorigin="anonymous">
                    <source src="../public/luxury-hero/mp4_1080_variantA.mp4" type="video/mp4">
                </video>
            </div>

            <!-- Texto do Hero -->
            <div id="heroText" class="hero-text" aria-hidden="false">
                <h1 class="hero-title">
                    <span class="part-a">Seu sorriso,</span><br class="mobile-break"><span class="part-b">sua
                        assinatura.</span>
                </h1>
                <p class="hero-sub">A harmonia perfeita entre ciência avançada e estética de alta costura.</p>

                <div class="hero-ctas">
                    <button class="btn-primary" aria-label="Agendar Consulta agora">Agendar Consulta</button>
                    <button class="btn-ghost" aria-label="Ver Galeria de Resultados">Galeria de Resultados</button>
                </div>
            </div>

        </section>
    </div>

    <script src="hero.js"></script>

</body>

</html>
